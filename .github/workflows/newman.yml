name: Newman Contract Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Lint contracts
        run: npm run lint:contracts

      - name: Start Prism servers
        run: |
          nohup npx prism mock contracts/iot-ingestion.openapi.yaml -p 4010 --host 0.0.0.0 > prism-iot.log 2>&1 &
          nohup npx prism mock contracts/ai-vision.openapi.yaml -p 4011 --host 0.0.0.0 > prism-ai.log 2>&1 &
          sleep 15

      - name: Check servers
        run: |
          curl http://localhost:4010/health
          curl http://localhost:4011/health

      - name: Run Newman
        run: npm run test:mock

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports/

      - name: Show Prism logs
        if: failure()
        run: |
          cat prism-iot.log || true
          cat prism-ai.log || true